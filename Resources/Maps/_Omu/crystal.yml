  - uid: 16654
    components:
    - type: MetaData
      name: Supermatter Containment Procedure
    - type: Transform
      parent: 16653
    - type: Paper
      content: >-
        [color=#ff733c]█▄ █ ▀█▀    [head=3]NT Engineering[/head]

        █ ▀█     █        [bold] Supermatter Containment Procedure[/bold] [/color]

        ──────────────────────────────────────────

        [bold]

        [head=2][color=red] DO NOT TOUCH THE SUPERMATTER[/color][/head]


        Supermatter Containment gas should NEVER rise above a temprature of 350°K.[/bold]


        [color=#ff733c][head=3]- - - Active Supermatter PPE/Emergency Prep - - -[/head][/color]


        If the SM is active, the following PPE must be worn at all times inside the SM room.

         [color=green]- PPE -[/color]
        ● Radiation PPE is required for any organics nearby the SM Crystal.

        ● Magboots are required when entering the SM Crystal chamber.

        ● Engineering goggles are required to view the SM Crystal directly.


        [color=red]- Emergency Preperations -[/color]

        ● At least one backpack water tank, and/or water tank on standby.

        ● Large supply of non-reactant gases, preferably nitrogen.

        ● A calm and collected demenor


        Reccomended Containment Gases:

        [color=#da1010][bold]● Nitrogen [/bold][/color]

        [color=#4e4e4e][bold]● Carbon Dioxide[/bold] [/color]

        [color=#8f00ff][bold]● Nitrous Oxide |Heat Resistant|[/bold][/color]


        [color=#ff733c][head=3]- - - Supermatter Inital Setup - - -[/head][/color]


        0. Fill and activate all Radiation Collectors. Double check all chamber wiring.


        1. Containment gas(es) of your choice should be placed within the cooling loop and cooled with radiatiors open to space. 

        If you wish to cool gasses below ~300°K, place 1-2 freezers after the radiators to cool to a minimum of 71°K.


        2. Ensure that any scrubbers inside the supermatter chamber are set to wide, and are filtering all gasses. Lingering Gasses inside the SM chamber are the leading cause of delamination.


        3. Ensure that all filters are filtering out containment gasses to be returned to the cooling loop. 


        4. Introduce the containment gasses to the SM chamber at a pressure of 101.3 kPa


        5. Double check all cooling systems are working nominaly, afterwards turn on the Emitters to Energize the SM Crystal.


        [color=red]Note: SM will very slowly consume cold loop gasses[/color]


        [color=#ff733c][head=3]- - Emergency SM Re-conatinment Procedure - -[/head][/color]

        [bold]

        [head=1][color=red] DO NOT PANIC[/color][/head]

        [/bold]

        Power off any emitters targeting the SM Crystal.


        Remove hot gasses by opening the WALL or DOOR of the SM chamber, spaced floors cause impropper gas flow.


        If the SM chamber is on fire, spray it with water from a backpack water tank or fire extinguisher.


        Ensure that a constant supply of non-reactive gas is being supplied to counteract the spacing.


        Once gas temparture has fallen below 300°K it is safe to close the SM chamber once more.


        Once internal crystal temprature has fallen below 200°K it is safe to re-enable the SM emitters.
    - type: Physics
      canCollide: False
  - uid: 16655
    components:
    - type: MetaData
      name: Supermatter General Information
    - type: Transform
      parent: 16653
    - type: Paper
      content: >2-

        [head=3] - Supermatter General Information - [head/]


        The SM consumes nearby gas based on pressure and internal temprature. Higher pressures and tempratures increase gas consumption


        The SM's internal properties change based on the temprature and type of gas consumed, please refer to the [bold]Gas Effects[/bold] page for this information.


        The SM will only begin losing integerty when internal tempratures reach 400°K or above, the higher the internal teprature the faster integrety is lost.


        Emitter bolts add energy to the SM. Energy increases radiation output, internal temprature, and gas consumption.
    - type: Physics
      canCollide: False
  - uid: 16656
    components:
    - type: MetaData
      name: SM Console Guide
    - type: Transform
      parent: 16653
    - type: Paper
      content: "\n[head=2]    - Supermatter Monitoring Console - [head/]\n\n[color=green][bold]      ϟ Integerity:[/color] Health of the Supermatter Crystal, [color=#c40811]if integrety falls to 0% the Supermater Crystal will begin to Delaminate.[/color][/bold]\n\n[color=#bec414][bold]      Ω Internal Energy:[/color] The amount of energy stored within the SM, mesured in GeV. Use Emitters to add energy.[/bold]\n\n[color=#39911f][bold]      λ Radiation Emission:[/color] The amount of [color=#39911f]radiation[/color] being emitted at the center of the SM Crystal, mesured in rads.[/bold]\n \n[color=teal][bold]      ϻ Absorbed Mols:[/color] The amount of [color=teal]Moles[/color] currently being consumed by the SM.[/bold]\n\n[color=#de862f][bold]      Δ Temprature:[/color] The current temprature of the SM, if this exceeds the [color=orange][bold]Temprature Limit[/color], the SM will begin loosing [color=green]Integerity.[/bold][/color]\n\n[color=orange][bold]      Λ Temprature Limit:[/color] The threshold before the SM begins taking temprature damage.[/bold]\n\n[color=#e65050][bold]      Ψ Waste Multiplier:[/color] The amount of waste gas that the SM expels. Typically: [color=#2887e8]Oxygen[/color], [color=#ff3300]Plasma[/color], and [color=#7b68ee]Pluoxium[/color].[/bold]\n\n[color=#e65050][bold]      ξ Absorbtion Ratio:[/color] Persentage of the surrounding atmosphere that is absorbed by the Supermatter Crystal.[/bold]\n"
    - type: Physics
      canCollide: False

        [color=#ff733c]█▄ █ ▀█▀    [head=3]NT Engineering[/head]

        █ ▀█     █        [bold] SMES Power Switch Operations Manual[/bold] [/color]

        ──────────────────────────────────────────

        [bold]

        Due to the high voltage nature of the Power Transmission Laser (PTL) it must be completely separated from the main power grid to prevent power fluctuations.


        Connect ONE of the two SMES units to divert power from the Supermatter Crystal to either the PTL or SMES banks.


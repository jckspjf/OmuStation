- type: entity
  parent: [ClothingEyesHudDiagnostic, BaseScienceContraband]
  id: ClothingEyesHudSciDiag #ClothingEyesGlassesSciDiag inherits this
  name: silicon-interfacing hud
  description: A state-of-the-art heads-up display combining both diagnostic information and silicon communication capabilities. Grants access to RobotTalk and the binary network. Say hi to your station AI!
  components:
  - type: Sprite
    sprite: _Omu/Clothing/Eyes/scidiag.rsi
  - type: Clothing
    sprite: _Omu/Clothing/Eyes/scidiag.rsi
  - type: ClothingGrantCollectiveMind
    minds:
    - Binary
    defaultChannel: Binary
  - type: HandheldTranslator # Thanks, Goob Italian Moustache!
    toggleOnInteract: false
    showInfoOnExamine: false
    spoken:
    - RobotTalk
    understood:
    - RobotTalk
  - type: StealTarget
    stealGroup: ClothingEyesHudSciDiag

- type: entity
  parent: ClothingEyesBase
  id: ClothingEyesHudJanitorial
  name: clean hud
  description: A heads-up display providing advanced telemetry on the location of puddles, trash, and all things filthy.
  components:
  - type: Sprite
    sprite: _Omu/Clothing/Eyes/janihud.rsi
  - type: Clothing
    sprite: _Omu/Clothing/Eyes/janihud.rsi
  - type: Tag
    tags:
    - PetWearable
    - WhitelistChameleon
  - type: JaniVision
    isEquipment: true
    toggleAction: ToggleJaniVision
    janiShader: "unshaded"
    showAllLights: false
    workingLightsColor: "#FFFFFF"
    brokenLightsColor: "#FF0000"
    emptyLightsColor: "#05FCFC"
    burnedLightsColor: "#2AFC05"
    distanceCheckMin: 1
    distanceCheckMax: 1.3
    distanceAlpha: 0.2
    tagColors:
      Trash: "#FF00FF"
  - type: SolutionScanner
